name: Build Auditions JSON

# OTR 오디션 사이트를 ZenRows 프록시 경유로 긁어 auditions.json 을 갱신/커밋한다.
# iOS 앱은 이 JSON 을 fetch 해서 화면에 띄운다.
#
# 무료 ZenRows 1000 credits/월, 한국 premium proxy + JS = 약 25 credits/call.
# 안전 마진 두고 하루 4회(=120/월) 정도로 운영.

on:
  schedule:
    # 매 6시간마다 (00:15, 06:15, 12:15, 18:15 UTC = 한국 09:15, 15:15, 21:15, 03:15)
    # GitHub schedule cron 은 보통 5~15분 지연될 수 있어서 15분에 출발하도록 약간 오프셋.
    - cron: '15 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

# 동시에 두 번 돌면서 같은 파일에 push 하는 경합 방지
concurrency:
  group: build-auditions
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Scrape OTR and build auditions.json
        env:
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
        run: python -m src.build_auditions

      - name: Commit auditions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add auditions.json
          if git diff --cached --quiet; then
            echo "No changes to auditions.json"
            exit 0
          fi
          git commit -m "chore: update auditions.json"
          git push
