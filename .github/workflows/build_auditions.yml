name: Build Auditions JSON

# OTR 오디션 사이트를 Cloudflare Worker 프록시 경유로 긁어 docs/auditions.json 을 갱신/커밋한다.
# PWA(GitHub Pages) 는 이 JSON 을 fetch 해서 화면에 띄운다.
#
# Cloudflare Workers 무료 plan: 10만 요청/일 — 우리는 하루 1번이라 사실상 무제한.
# cupid.js 봇 챌린지는 Python 측에서 AES-CBC 복호화로 자동 해결.

on:
  schedule:
    # 매일 한국 시간 20:00 (UTC 11:00) 1회. GitHub cron 은 5~15분 지연될 수 있다.
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

# 동시에 두 번 돌면서 같은 파일에 push 하는 경합 방지
concurrency:
  group: build-auditions
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Scrape OTR and build auditions.json
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python -m src.build_auditions

      - name: Commit auditions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/auditions.json
          if git diff --cached --quiet; then
            echo "No changes to docs/auditions.json"
            exit 0
          fi
          git commit -m "chore: update auditions.json"
          git push
